<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

<div class="topbar">

<h1>📚 Course Compass Dashboard</h1>

<button onclick="logout()">
Logout
</button>

</div>

<div class="form-card">

<input
type="text"
id="title"
placeholder="Learning Plan Title">

<textarea
id="goal"
placeholder="Describe your learning goal">
</textarea>

<button onclick="addPlan()">
Create Learning Plan
</button>

</div>

<div id="plans"></div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
