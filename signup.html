<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-card">

<h1>Create Account</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="signup()">
Signup
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="auth.js"></script>

</body>
</html>
